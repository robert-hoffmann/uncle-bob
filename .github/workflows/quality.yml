name: quality

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  python-quality:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Python (ruff)
            target: lint-py
          - name: YAML (yamllint)
            target: lint-yaml
          - name: Repository Catalog
            target: test-repo-catalog
          - name: Package Metadata
            target: test-package-metadata
          - name: Repository Paths
            target: test-repo-paths
          - name: Skill Schema
            target: test-skill-schema
          - name: Governance Integrity
            target: test-governance-integrity
          - name: Governance Regression
            target: test-governance
          - name: Repo Maintenance Regression
            target: test-repo-maintenance
          - name: Workflow Regression
            target: test-workflow

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Install Task
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin"

      - name: Add Task to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync Python tooling
        run: uv sync

      - name: Run ${{ matrix.target }}
        run: task ${{ matrix.target }}

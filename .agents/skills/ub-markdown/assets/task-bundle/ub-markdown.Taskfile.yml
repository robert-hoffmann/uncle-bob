# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  MARKDOWNLINT: npx --yes markdownlint-cli2

tasks:
  lint-md:
    desc: Run markdownlint-cli2 on the repository Markdown files
    cmd: '{{.MARKDOWNLINT}} "**/*.md"'

  lint-md-files:
    desc: Run markdownlint-cli2 on explicit files or globs (pass args after --)
    cmd: "{{.MARKDOWNLINT}} {{.CLI_ARGS}}"

# See https://pre-commit.com for docs
# Install with: task setup

repos:
  - repo: local
    hooks:
      - id: lint-python
        name: Python lint (authoritative Taskfile scope)
        language: system
        entry: task lint-py
        pass_filenames: false
        always_run: true

      - id: lint-yaml
        name: YAML lint (authoritative Taskfile scope)
        language: system
        entry: task lint-yaml
        pass_filenames: false
        always_run: true

      - id: governance-integrity
        name: Governance integrity checks
        language: system
        entry: uv run python scripts/repo-maintenance/check_skill_integrity.py
        pass_filenames: false
        always_run: true

      - id: governance-regression
        name: Governance script regression tests
        language: system
        entry: >
          uv run python -m unittest discover -s tests/skills/ub-governance -p
          'test_*.py' -v
        pass_filenames: false
        always_run: true
